<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meeting Recorder (MP3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    
    <style>
        /* アニメーション定義 */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root">読み込み中...</div>

    <script type="text/babel">
        // ページ全体が読み込まれた後に実行するように設定
        window.onload = () => {
            const { useState, useRef, useEffect, useCallback } = React;

            // --- アイコンコンポーネント ---
            const Icon = ({ path, className, ...props }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{path}</svg>
            );
            const Mic = (props) => <Icon path={<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>} {...props} />;
            const Square = (props) => <Icon path={<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>} {...props} />;
            const Pause = (props) => <Icon path={<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>} {...props} />;
            const Download = (props) => <Icon path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} {...props} />;
            const Trash2 = (props) => <Icon path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} {...props} />;
            const Clock = (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} {...props} />;
            const Bookmark = (props) => <Icon path={<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>} {...props} />;
            const Flag = (props) => <Icon path={<><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></>} {...props} />;
            const CheckCircle = (props) => <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} {...props} />;
            const AlertCircle = (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} {...props} />;
            const RefreshCw = (props) => <Icon path={<><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>} {...props} />;

            // --- IndexedDB ヘルパー関数 ---
            const DB_NAME = 'MeetingRecorderDB';
            const STORE_NAME = 'recordings';
            const DB_VERSION = 1;

            const openDB = () => new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });

            const saveRecordingToDB = async (recording) => {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction([STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.add(recording);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            };

            const getAllRecordingsFromDB = async () => {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            };

            const deleteRecordingFromDB = async (id) => {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction([STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            // --- メインアプリ ---
            function App() {
                const [isRecording, setIsRecording] = useState(false);
                const [isPaused, setIsPaused] = useState(false);
                const [recordingTime, setRecordingTime] = useState(0);
                const [recordings, setRecordings] = useState([]);
                const [currentNotes, setCurrentNotes] = useState([]);
                const [noteInput, setNoteInput] = useState('');
                const [isLoading, setIsLoading] = useState(true);
                const [currentTime, setCurrentTime] = useState(new Date());

                const audioContextRef = useRef(null);
                const processorRef = useRef(null);
                const mp3EncoderRef = useRef(null);
                const audioChunksRef = useRef([]);
                const timerIntervalRef = useRef(null);
                const analyserRef = useRef(null);
                const canvasRef = useRef(null);
                const animationFrameRef = useRef(null);
                const streamRef = useRef(null);

                useEffect(() => {
                    const interval = setInterval(() => setCurrentTime(new Date()), 1000);
                    return () => clearInterval(interval);
                }, []);

                useEffect(() => {
                    const loadData = async () => {
                        try {
                            const savedRecordings = await getAllRecordingsFromDB();
                            const recordingsWithUrls = savedRecordings.map(rec => ({
                                ...rec,
                                url: URL.createObjectURL(rec.blob)
                            })).sort((a, b) => b.id - a.id);
                            setRecordings(recordingsWithUrls);
                        } catch (err) { console.error("データ読み込み失敗:", err); }
                        finally { setIsLoading(false); }
                    };
                    loadData();
                }, []);

                const drawVisualizer = useCallback(() => {
                    if (!canvasRef.current || !analyserRef.current) return;
                    const canvas = canvasRef.current;
                    const canvasCtx = canvas.getContext('2d');
                    const analyser = analyserRef.current;
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);

                    const draw = () => {
                        if (!isRecording || isPaused) { cancelAnimationFrame(animationFrameRef.current); return; }
                        animationFrameRef.current = requestAnimationFrame(draw);
                        analyser.getByteFrequencyData(dataArray);
                        canvasCtx.fillStyle = '#f8fafc';
                        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                        const barWidth = (canvas.width / bufferLength) * 2.5;
                        let x = 0;
                        for (let i = 0; i < bufferLength; i++) {
                            const barHeight = dataArray[i] / 1.5;
                            const gradient = canvasCtx.createLinearGradient(0, canvas.height, 0, 0);
                            gradient.addColorStop(0, '#6366f1');
                            gradient.addColorStop(1, '#a5b4fc');
                            canvasCtx.fillStyle = gradient;
                            canvasCtx.beginPath();
                            canvasCtx.roundRect(x, canvas.height - barHeight, barWidth, barHeight, 5);
                            canvasCtx.fill();
                            x += barWidth + 1;
                        }
                    };
                    draw();
                }, [isRecording, isPaused]);

                const startRecording = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        streamRef.current = stream;
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        const ctx = new AudioContext();
                        audioContextRef.current = ctx;
                        const source = ctx.createMediaStreamSource(stream);
                        const analyser = ctx.createAnalyser();
                        analyser.fftSize = 256;
                        source.connect(analyser);
                        analyserRef.current = analyser;
                        const mp3Encoder = new lamejs.Mp3Encoder(1, ctx.sampleRate, 128);
                        mp3EncoderRef.current = mp3Encoder;
                        audioChunksRef.current = [];
                        const processor = ctx.createScriptProcessor(4096, 1, 1);
                        processorRef.current = processor;
                        source.connect(processor);
                        processor.connect(ctx.destination);
                        processor.onaudioprocess = (e) => {
                            if (isPaused) return;
                            const inputBuffer = e.inputBuffer.getChannelData(0);
                            const samples = new Int16Array(inputBuffer.length);
                            for (let i = 0; i < inputBuffer.length; i++) {
                                let s = Math.max(-1, Math.min(1, inputBuffer[i]));
                                samples[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            const mp3buf = mp3Encoder.encodeBuffer(samples);
                            if (mp3buf.length > 0) audioChunksRef.current.push(mp3buf);
                        };
                        setIsRecording(true);
                        setIsPaused(false);
                        timerIntervalRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
                    } catch (err) { alert("マイクへのアクセスを許可してください。"); }
                };

                const stopRecording = async () => {
                    if (!isRecording) return;
                    if (processorRef.current) processorRef.current.disconnect();
                    if (audioContextRef.current) audioContextRef.current.close();
                    if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
                    if (mp3EncoderRef.current) {
                        const mp3buf = mp3EncoderRef.current.flush();
                        if (mp3buf.length > 0) audioChunksRef.current.push(mp3buf);
                    }
                    const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/mp3' });
                    const newRecording = { id: Date.now(), blob: audioBlob, date: new Date().toLocaleString('ja-JP'), duration: recordingTime, notes: currentNotes };
                    await saveRecordingToDB(newRecording);
                    setRecordings(prev => [{ ...newRecording, url: URL.createObjectURL(audioBlob) }, ...prev]);
                    setIsRecording(false);
                    clearInterval(timerIntervalRef.current);
                    setRecordingTime(0); setCurrentNotes([]); setNoteInput('');
                };

                const togglePause = () => {
                    if (isPaused) {
                        timerIntervalRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
                        setIsPaused(false);
                        if (audioContextRef.current) audioContextRef.current.resume();
                    } else {
                        clearInterval(timerIntervalRef.current);
                        setIsPaused(true);
                        if (audioContextRef.current) audioContextRef.current.suspend();
                    }
                };

                useEffect(() => { if (isRecording && !isPaused) drawVisualizer(); }, [isRecording, isPaused, drawVisualizer]);

                const addNote = (type = 'note', text = '') => {
                    const newNote = { id: Date.now(), time: recordingTime, type: type, text: text || 'メモ' };
                    setCurrentNotes(prev => [...prev, newNote]);
                };

                const deleteRecording = async (id) => {
                    if (!confirm('本当に削除しますか？')) return;
                    await deleteRecordingFromDB(id);
                    setRecordings(prev => prev.filter(rec => rec.id !== id));
                };

                if (isLoading) return <div className="min-h-screen flex items-center justify-center">読み込み中...</div>;

                return (
                    <div className="min-h-screen bg-slate-50 p-4">
                        <div className="max-w-3xl mx-auto">
                            <header className="mb-8">
                                <h1 className="text-2xl font-bold flex items-center gap-2"><Mic className="text-indigo-600"/> Smart Meeting Recorder</h1>
                            </header>
                            <div className="bg-white rounded-3xl p-6 shadow-xl mb-8">
                                <div className="text-center mb-6">
                                    <div className="text-5xl font-mono font-bold text-slate-700">{formatTime(recordingTime)}</div>
                                </div>
                                <canvas ref={canvasRef} width="800" height="200" className="w-full bg-slate-50 rounded-xl mb-6"/>
                                <div className="flex justify-center gap-4">
                                    {!isRecording ? <button onClick={startRecording} className="bg-indigo-600 text-white px-8 py-3 rounded-full">録音開始</button> :
                                    <><button onClick={togglePause} className="bg-slate-200 px-6 py-3 rounded-full">{isPaused ? "再開" : "一時停止"}</button>
                                    <button onClick={stopRecording} className="bg-rose-500 text-white px-8 py-3 rounded-full">終了</button></>}
                                </div>
                            </div>
                            <div className="space-y-4">
                                {recordings.map(rec => (
                                    <div key={rec.id} className="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center">
                                        <div><div className="font-bold">会議録音</div><div className="text-sm text-slate-400">{rec.date}</div></div>
                                        <div className="flex gap-2"><audio src={rec.url} controls className="h-8"/><button onClick={() => deleteRecording(rec.id)} className="text-rose-500">削除</button></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
