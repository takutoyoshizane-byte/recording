    <script type="text/babel">
        // <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meeting Recorder (MP3)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- lamejs (MP3 Encoder) -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    
    <style>
        /* アニメーション定義 */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- アイコンコンポーネント ---
        const Icon = ({ path, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{path}</svg>
        );
        const Mic = (props) => <Icon path={<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>} {...props} />;
        const Square = (props) => <Icon path={<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>} {...props} />;
        const Pause = (props) => <Icon path={<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>} {...props} />;
        const Download = (props) => <Icon path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} {...props} />;
        const Trash2 = (props) => <Icon path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} {...props} />;
        const Clock = (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} {...props} />;
        const Bookmark = (props) => <Icon path={<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>} {...props} />;
        const Flag = (props) => <Icon path={<><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></>} {...props} />;
        const CheckCircle = (props) => <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} {...props} />;
        const AlertCircle = (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} {...props} />;
        const RefreshCw = (props) => <Icon path={<><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>} {...props} />;

        // --- IndexedDB ヘルパー関数 ---
        const DB_NAME = 'MeetingRecorderDB';
        const STORE_NAME = 'recordings';
        const DB_VERSION = 1;

        const openDB = () => {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (event) => {
              const db = event.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'id' });
              }
            };
            request.onsuccess = (event) => resolve(event.target.result);
            request.onerror = (event) => reject(event.target.error);
          });
        };

        const saveRecordingToDB = async (recording) => {
          const db = await openDB();
          return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.add(recording);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
          });
        };

        const getAllRecordingsFromDB = async () => {
          const db = await openDB();
          return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
        };

        const deleteRecordingFromDB = async (id) => {
          const db = await openDB();
          return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
          });
        };

        // --- 時間フォーマット ---
        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        };

        // --- メインアプリ ---
        function App() {
          const [isRecording, setIsRecording] = useState(false);
          const [isPaused, setIsPaused] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const [recordings, setRecordings] = useState([]);
          const [currentNotes, setCurrentNotes] = useState([]); 
          const [noteInput, setNoteInput] = useState('');
          const [isLoading, setIsLoading] = useState(true);
          const [currentTime, setCurrentTime] = useState(new Date());
          
          const audioContextRef = useRef(null);
          const processorRef = useRef(null);
          const mp3EncoderRef = useRef(null);
          const audioChunksRef = useRef([]); // MP3チャンク用
          
          const timerIntervalRef = useRef(null);
          const analyserRef = useRef(null);
          const canvasRef = useRef(null);
          const animationFrameRef = useRef(null);
          const streamRef = useRef(null);

          // 時計更新
          useEffect(() => {
            const interval = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(interval);
          }, []);

          // 初期ロード
          useEffect(() => {
            const loadData = async () => {
              try {
                const savedRecordings = await getAllRecordingsFromDB();
                const recordingsWithUrls = savedRecordings.map(rec => ({
                  ...rec,
                  url: URL.createObjectURL(rec.blob)
                })).sort((a, b) => b.id - a.id);
                
                setRecordings(recordingsWithUrls);
              } catch (err) {
                console.error("データの読み込みに失敗しました:", err);
              } finally {
                setIsLoading(false);
              }
            };
            loadData();
          }, []);

          // ビジュアライザー
          const drawVisualizer = useCallback(() => {
            if (!canvasRef.current || !analyserRef.current) return;

            const canvas = canvasRef.current;
            const canvasCtx = canvas.getContext('2d');
            const analyser = analyserRef.current;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const draw = () => {
              if (!isRecording || isPaused) {
                cancelAnimationFrame(animationFrameRef.current);
                return;
              }
              
              animationFrameRef.current = requestAnimationFrame(draw);
              analyser.getByteFrequencyData(dataArray);

              canvasCtx.fillStyle = '#f8fafc'; 
              canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

              const barWidth = (canvas.width / bufferLength) * 2.5;
              let barHeight;
              let x = 0;

              for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 1.5;
                const gradient = canvasCtx.createLinearGradient(0, canvas.height, 0, 0);
                gradient.addColorStop(0, '#6366f1'); 
                gradient.addColorStop(1, '#a5b4fc'); 

                canvasCtx.fillStyle = gradient;
                canvasCtx.beginPath();
                canvasCtx.roundRect(x, canvas.height - barHeight, barWidth, barHeight, 5);
                canvasCtx.fill();
                x += barWidth + 1;
              }
            };
            draw();
          }, [isRecording, isPaused]);

          // --- MP3録音開始処理 ---
          const startRecording = async () => {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              streamRef.current = stream;

              // AudioContext作成
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioContext();
              audioContextRef.current = ctx;

              // 音源ソースとアナライザーの接続
              const source = ctx.createMediaStreamSource(stream);
              const analyser = ctx.createAnalyser();
              analyser.fftSize = 256;
              source.connect(analyser);
              analyserRef.current = analyser;

              // MP3エンコーダーの初期化
              // 1チャンネル(モノラル), サンプルレート, 128kbps
              const mp3Encoder = new lamejs.Mp3Encoder(1, ctx.sampleRate, 128);
              mp3EncoderRef.current = mp3Encoder;
              audioChunksRef.current = [];

              // ScriptProcessor (録音処理)
              // バッファサイズ4096, 1入力, 1出力
              const processor = ctx.createScriptProcessor(4096, 1, 1);
              processorRef.current = processor;

              source.connect(processor);
              processor.connect(ctx.destination); // 処理を継続させるために接続が必要

              processor.onaudioprocess = (e) => {
                if (isPaused) return; // 一時停止中は処理しない

                const inputBuffer = e.inputBuffer.getChannelData(0); // モノラル入力
                // float(-1.0〜1.0) を int16 に変換
                const samples = new Int16Array(inputBuffer.length);
                for (let i = 0; i < inputBuffer.length; i++) {
                   let s = Math.max(-1, Math.min(1, inputBuffer[i]));
                   samples[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }

                // MP3エンコード
                const mp3buf = mp3Encoder.encodeBuffer(samples);
                if (mp3buf.length > 0) {
                    audioChunksRef.current.push(mp3buf);
                }
              };

              setIsRecording(true);
              setIsPaused(false);

              timerIntervalRef.current = setInterval(() => {
                setRecordingTime(prev => prev + 1);
              }, 1000);

            } catch (err) {
              console.error("マイクエラー:", err);
              alert("マイクへのアクセスを許可してください。\n(ブラウザの設定でブロックされている可能性があります)");
            }
          };

          // --- 録音停止 & MP3保存 ---
          const stopRecording = async () => {
            if (!isRecording) return;

            // プロセッサ停止
            if (processorRef.current) {
              processorRef.current.disconnect();
              processorRef.current.onaudioprocess = null;
            }
            if (audioContextRef.current) {
              audioContextRef.current.close();
            }
            if (streamRef.current) {
              streamRef.current.getTracks().forEach(track => track.stop());
            }

            // 残りのバッファをフラッシュ
            if (mp3EncoderRef.current) {
              const mp3buf = mp3EncoderRef.current.flush();
              if (mp3buf.length > 0) {
                audioChunksRef.current.push(mp3buf);
              }
            }

            // MP3 Blob作成
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/mp3' });
            const timestamp = new Date().toLocaleString('ja-JP');
            
            const newRecording = {
              id: Date.now(),
              blob: audioBlob,
              date: timestamp,
              duration: recordingTime,
              notes: currentNotes
            };

            try {
              await saveRecordingToDB(newRecording);
              setRecordings(prev => [{
                ...newRecording,
                url: URL.createObjectURL(audioBlob)
              }, ...prev]);
            } catch (err) {
              console.error("保存失敗", err);
              alert("保存に失敗しました。");
            }

            setIsRecording(false);
            setIsPaused(false);
            clearInterval(timerIntervalRef.current);
            if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
            
            // リセット
            setRecordingTime(0);
            setCurrentNotes([]);
            setNoteInput('');
          };

          // 一時停止
          const togglePause = () => {
            if (isPaused) {
              // 再開
              timerIntervalRef.current = setInterval(() => {
                setRecordingTime(prev => prev + 1);
              }, 1000);
              setIsPaused(false);
              // AudioContextが停止している場合は再開
              if (audioContextRef.current && audioContextRef.current.state === 'suspended') {
                audioContextRef.current.resume();
              }
            } else {
              // 一時停止
              clearInterval(timerIntervalRef.current);
              setIsPaused(true);
              // AudioContextを一時停止
              if (audioContextRef.current && audioContextRef.current.state === 'running') {
                audioContextRef.current.suspend();
              }
            }
          };

          useEffect(() => {
            if (isRecording && !isPaused) {
              drawVisualizer();
            }
          }, [isRecording, isPaused, drawVisualizer]);

          // メモ
          const addNote = (type = 'note', text = '') => {
            const newNote = {
              id: Date.now(),
              time: recordingTime,
              type: type,
              text: text || (type === 'important' ? '重要なポイント' : type === 'todo' ? '決定事項/TODO' : 'メモ')
            };
            setCurrentNotes(prev => [...prev, newNote]);
          };

          const handleManualNoteSubmit = (e) => {
            e.preventDefault();
            if (!noteInput.trim()) return;
            addNote('note', noteInput);
            setNoteInput('');
          };

          // 削除
          const deleteRecording = async (id) => {
            if(!confirm('本当に削除しますか？')) return;
            try {
              await deleteRecordingFromDB(id);
              setRecordings(prev => prev.filter(rec => rec.id !== id));
            } catch (err) {
              console.error("削除失敗:", err);
            }
          };

          if (isLoading) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-400">
                <RefreshCw className="w-8 h-8 animate-spin" />
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 pb-20">
              <div className="max-w-3xl mx-auto p-4 md:p-8">
                
                {/* ヘッダー */}
                <header className="mb-8 flex items-center justify-between">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                      <Mic className="w-8 h-8 text-indigo-600" />
                      Smart Meeting Recorder
                    </h1>
                    <p className="text-slate-500 text-sm mt-1">MP3で高音質保存</p>
                  </div>
                  <div className="text-right hidden md:block">
                     <div className="text-sm font-medium text-slate-400">現在時刻</div>
                     <div className="text-lg font-mono text-slate-700">
                       {currentTime.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'})}
                     </div>
                  </div>
                </header>

                {/* メイン録音エリア */}
                <div className="bg-white rounded-3xl shadow-xl shadow-indigo-100 overflow-hidden border border-slate-100 mb-8 relative">
                  
                  {/* タイマー */}
                  <div className="absolute top-6 left-0 right-0 text-center z-10">
                    <div className={`text-5xl font-mono font-bold tracking-tighter transition-colors duration-300 ${isRecording && !isPaused ? 'text-indigo-600' : 'text-slate-300'}`}>
                      {formatTime(recordingTime)}
                    </div>
                    <div className="text-xs font-bold uppercase tracking-widest text-slate-400 mt-2">
                      {isRecording ? (isPaused ? 'PAUSED' : 'RECORDING') : 'READY'}
                    </div>
                  </div>

                  {/* ビジュアライザー */}
                  <div className="h-64 w-full flex items-end justify-center bg-slate-50 relative">
                     <canvas 
                       ref={canvasRef} 
                       width="800" 
                       height="256"
                       className="w-full h-full object-cover opacity-80"
                     />
                     {!isRecording && recordings.length === 0 && (
                       <div className="absolute inset-0 flex items-center justify-center text-slate-400">
                         <p>録音ボタンを押して会議を開始</p>
                       </div>
                     )}
                  </div>

                  {/* コントロール */}
                  <div className="p-6 bg-white border-t border-slate-100">
                    <div className="flex justify-center items-center gap-6 mb-6">
                      {!isRecording ? (
                        <button
                          onClick={startRecording}
                          className="group relative flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-full shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all hover:scale-105 active:scale-95"
                        >
                          <div className="absolute inset-0 rounded-full border-2 border-white opacity-20 group-hover:scale-110 transition-transform"></div>
                          <Mic className="w-8 h-8 text-white" />
                        </button>
                      ) : (
                        <React.Fragment>
                          <button
                            onClick={togglePause}
                            className="flex items-center justify-center w-16 h-16 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-600 transition-all active:scale-95"
                            title={isPaused ? "再開" : "一時停止"}
                          >
                            {isPaused ? <Mic className="w-6 h-6" /> : <Pause className="w-6 h-6" />}
                          </button>

                          <button
                            onClick={stopRecording}
                            className="flex items-center justify-center w-20 h-20 bg-rose-500 rounded-full shadow-lg shadow-rose-200 hover:bg-rose-600 transition-all hover:scale-105 active:scale-95"
                            title="録音終了"
                          >
                            <Square className="w-8 h-8 text-white fill-current" />
                          </button>
                        </React.Fragment>
                      )}
                    </div>

                    {/* クイックメモ */}
                    {isRecording && (
                      <div className="animate-fade-in-up">
                        <div className="flex gap-2 justify-center mb-4">
                          <button onClick={() => addNote('important')} className="flex items-center gap-1 px-4 py-2 bg-amber-50 text-amber-700 rounded-full text-sm font-medium hover:bg-amber-100 border border-amber-200 transition-colors">
                            <AlertCircle className="w-4 h-4" /> 重要
                          </button>
                          <button onClick={() => addNote('todo')} className="flex items-center gap-1 px-4 py-2 bg-emerald-50 text-emerald-700 rounded-full text-sm font-medium hover:bg-emerald-100 border border-emerald-200 transition-colors">
                            <CheckCircle className="w-4 h-4" /> 決定/TODO
                          </button>
                          <button onClick={() => addNote('bookmark')} className="flex items-center gap-1 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-full text-sm font-medium hover:bg-indigo-100 border border-indigo-200 transition-colors">
                            <Bookmark className="w-4 h-4" /> しおり
                          </button>
                        </div>
                        
                        <form onSubmit={handleManualNoteSubmit} className="relative max-w-md mx-auto">
                          <input
                            type="text"
                            value={noteInput}
                            onChange={(e) => setNoteInput(e.target.value)}
                            placeholder="簡易メモを入力してEnter..."
                            className="w-full pl-4 pr-10 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm"
                          />
                          <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600">
                            <Flag className="w-4 h-4" />
                          </button>
                        </form>

                        {currentNotes.length > 0 && (
                          <div className="mt-4 max-h-32 overflow-y-auto space-y-1 px-4">
                            {currentNotes.slice().reverse().map((note) => (
                              <div key={note.id} className="text-xs text-slate-500 flex gap-2">
                                <span className="font-mono text-slate-400">{formatTime(note.time)}</span>
                                <span className={
                                  note.type === 'important' ? 'text-amber-600 font-bold' :
                                  note.type === 'todo' ? 'text-emerald-600 font-bold' : ''
                                }>{note.text}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>

                {/* 履歴 */}
                <div className="space-y-4">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <Clock className="w-5 h-5 text-slate-400" />
                    保存済み録音履歴 (MP3)
                  </h2>
                  
                  {recordings.length === 0 ? (
                    <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400">
                      まだ録音はありません。<br/>ブラウザを閉じてもデータはここに残ります。
                    </div>
                  ) : (
                    recordings.map((rec) => (
                      <div key={rec.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                          <div>
                            <div className="text-sm text-slate-400 mb-1">{rec.date}</div>
                            <div className="text-xl font-bold text-slate-700">会議録音</div>
                          </div>
                          <div className="flex items-center gap-3">
                            <div className="bg-slate-100 px-3 py-1 rounded-md text-slate-600 font-mono text-sm">
                              {formatTime(rec.duration)}
                            </div>
                            <a 
                              href={rec.url} 
                              download={`meeting-${rec.id}.mp3`}
                              className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors"
                              title="MP3でダウンロード"
                            >
                              <Download className="w-5 h-5" />
                            </a>
                            <button 
                              onClick={() => deleteRecording(rec.id)}
                              className="p-2 text-rose-400 hover:bg-rose-50 rounded-full transition-colors"
                              title="削除"
                            >
                              <Trash2 className="w-5 h-5" />
                            </button>
                          </div>
                        </div>

                        <audio src={rec.url} controls className="w-full h-8 mb-4 opacity-80" />

                        {rec.notes && rec.notes.length > 0 && (
                          <div className="bg-slate-50 rounded-xl p-4 border border-slate-100">
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">タイムスタンプ・メモ</h3>
                            <ul className="space-y-2">
                              {rec.notes.map((note) => (
                                <li key={note.id} className="text-sm flex gap-3 items-start">
                                  <button 
                                    className="font-mono text-indigo-500 hover:underline cursor-pointer bg-white px-2 py-0.5 rounded border border-slate-200 text-xs mt-0.5"
                                    onClick={() => {
                                      const audio = document.querySelector(`audio[src="${rec.url}"]`);
                                      if(audio) {
                                        audio.currentTime = note.time;
                                        audio.play();
                                      }
                                    }}
                                  >
                                    {formatTime(note.time)}
                                  </button>
                                  <span className={
                                    note.type === 'important' ? 'text-amber-700 font-medium bg-amber-50 px-1 rounded' :
                                    note.type === 'todo' ? 'text-emerald-700 font-medium bg-emerald-50 px-1 rounded' :
                                    'text-slate-600'
                                  }>
                                    {note.text}
                                  </span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        )}
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
