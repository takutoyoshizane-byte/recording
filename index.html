<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meeting Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    
    <style>
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root">読み込み中...</div>

    <script type="text/babel">
        // ライブラリの読み込み完了を待ってから実行
        window.onload = () => {
            const { useState, useRef, useEffect, useCallback } = React;

            // --- 共通コンポーネント ---
            const Icon = ({ path, className, ...props }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{path}</svg>
            );
            const Mic = (props) => <Icon path={<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>} {...props} />;

            // --- IndexedDBロジック ---
            const DB_NAME = 'MeetingRecorderDB';
            const STORE_NAME = 'recordings';
            const openDB = () => new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
                request.onsuccess = (e) => resolve(e.target.result);
            });

            // --- メインアプリ ---
            function App() {
                const [isRecording, setIsRecording] = useState(false);
                const [isPaused, setIsPaused] = useState(false);
                const [recordingTime, setRecordingTime] = useState(0);
                const [recordings, setRecordings] = useState([]);
                const [isLoading, setIsLoading] = useState(true);

                useEffect(() => {
                    const fetchData = async () => {
                        const db = await openDB();
                        const transaction = db.transaction(STORE_NAME, 'readonly');
                        const request = transaction.objectStore(STORE_NAME).getAll();
                        request.onsuccess = () => {
                            setRecordings(request.result);
                            setIsLoading(false);
                        };
                    };
                    fetchData();
                }, []);

                if (isLoading) return <div className="p-10 text-center">読み込み中...</div>;

                return (
                    <div className="max-w-3xl mx-auto p-8">
                        <h1 className="text-2xl font-bold mb-6 flex items-center gap-2">
                            <Mic className="text-indigo-600"/> Smart Meeting Recorder
                        </h1>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="text-4xl font-mono mb-4">{Math.floor(recordingTime/60).toString().padStart(2,'0')}:{ (recordingTime%60).toString().padStart(2,'0')}</div>
                            <button 
                                onClick={() => setIsRecording(!isRecording)}
                                className="bg-indigo-600 text-white px-6 py-2 rounded-lg"
                            >
                                {isRecording ? "停止" : "録音開始"}
                            </button>
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
